# .github/workflows/deploy-hf.yml
name: Deploy to HF Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        env:
          HF_SSH_KEY: ${{ secrets.HF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HF_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      - name: Verify key integrity
        run: ssh-keygen -lf ~/.ssh/id_ed25519 2>&1 || echo "CLÉ INVALIDE"
      - name: ssh-keyscan
        run: ssh-keyscan -p 22 -H hf.co >> ~/.ssh/known_hosts
      - name: Push
        run: |
          git remote add space git@hf.co:spaces/Amomas/forest-rag || true
          git push space main --force